name: CMake

on:
  push:
    branches: [ "main", "draft-18" ]
  pull_request:
    branches: [ "main", "draft-18" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '18'
          exclude-regex: '(dependencies)'

  build:
    strategy:
      matrix:
        os: [  macos-latest, ubuntu-22.04, ubuntu-22.04-arm ]

    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install Packages (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install llvm go google-benchmark
        LLVM_PREFIX="$(brew --prefix llvm)"
        echo "CC=$LLVM_PREFIX/bin/clang" >> "$GITHUB_ENV"
        echo "CXX=$LLVM_PREFIX/bin/clang++" >> "$GITHUB_ENV"
        echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
        ln -s "$LLVM_PREFIX/bin/clang-tidy" "/usr/local/bin/clang-tidy"

    - name: Install Packages (Ubuntu)
      if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm'
      run: |
        sudo apt-get install -y clang-tidy-15

    - name: Configure GCC 12 (Ubuntu)
      if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm'
      run: |
        echo "CC=/usr/bin/gcc-12" >> $GITHUB_ENV
        echo "CXX=/usr/bin/g++-12" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DLINT=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_TESTING=ON -DQUICR_BUILD_EXAMPLES=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{matrix.os}}-build-output
        path: ${{github.workspace}}/build
        retention-days: 5

  test:
    needs: build
    strategy:
      matrix:
        os: [  macos-latest, ubuntu-22.04, ubuntu-22.04-arm ]

    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Download Build Artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{matrix.os}}-build-output
          path: ${{github.workspace}}/build

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: |
          chmod -R +rx ${{github.workspace}}/build
          ctest -C ${{env.BUILD_TYPE}} --output-on-failure

  benchmark:
    needs: build
    strategy:
      matrix:
        os: [  macos-latest, ubuntu-22.04, ubuntu-22.04-arm ]

    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Download Build Artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{matrix.os}}-build-output
          path: ${{github.workspace}}/build

      - name: Benchmark
        run: |
          chmod +x ${{github.workspace}}/build/benchmark/quicr_benchmark
          ${{github.workspace}}/build/benchmark/quicr_benchmark
